name: zad
description: "تطبيق لياقة وتغذية — كودنيم: زاد (الاسم النهائي لاحقاً)"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # واجهة وحركة
  google_fonts: ^6.2.1        # خط tajawal العربي
  flutter_animate: ^4.5.0     # حركات إعلانية (fade/slide/scale/shimmer)

  # حالة وتخزين
  provider: ^6.1.2            # إدارة حالة الثيم
  shared_preferences: ^2.3.2  # حفظ اختيار الثيم

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4

  # أدوات
  intl: ^0.19.0              # تواريخ وأرقام عربية
  http: ^1.2.2              # نداء الـ AI لاحقاً

  # ميزات جديدة
  mobile_scanner: ^5.2.3          # Barcode scanner
  flutter_local_notifications: ^17.2.2  # Water reminders
  image_picker: ^1.1.2            # Progress photos
  path_provider: ^2.1.4           # حفظ صور محلياً

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 23
  web:
    generate: false

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
